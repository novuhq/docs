name: PR Checks

on:
  pull_request:
    branches: ['*']

jobs:
  build-and-lint:
    name: Build and Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Run linting
        run: |
          pnpm run lint
          pnpm run lint:mdx
          pnpm run format:check

      - name: Vale prose lint
        uses: vale-cli/vale-action@v2.1.1
        with:
          version: 3.9.1
          files: content
          # Advisory only — annotations surface on the PR but don't fail CI
          # while the existing docs corpus still has many legacy violations.
          fail_on_error: false
          # Only flag lines touched by the PR to avoid reviewdog's
          # "too many annotations" failures on full-corpus scans.
          filter_mode: added
          reporter: github-pr-check

      - name: Build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}}
          NEXT_PUBLIC_SEGMENT_WRITE_KEY: ${{ secrets.NEXT_PUBLIC_SEGMENT_WRITE_KEY }}
        run: pnpm run build 