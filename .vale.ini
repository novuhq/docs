# Vale configuration — see https://vale.sh/docs/topics/config
# Run `vale sync` once after install to download third-party packages.

# Where downloaded style packages and custom styles live.
StylesPath = .vale/styles

# Minimum severity to report: suggestion < warning < error.
MinAlertLevel = suggestion

# Third-party style packages fetched by `vale sync`.
Packages = Google, write-good

# Treat MDX files as Markdown (Vale has no native MDX parser).
[formats]
mdx = md

# Project vocabulary lives at .vale/styles/config/vocabularies/Base.
Vocab = Base

# Apply Google, write-good, and the custom Novu style to all prose files.
[*.{md,mdx}]
BasedOnStyles = Google, Novu, write-good

# Loosen a few Google rules that are noisy on technical docs.
Google.WordList = NO
Google.Headings = warning
Google.Will = NO
Google.We = NO
